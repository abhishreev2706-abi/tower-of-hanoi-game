<!DOCTYPE html>
<html>
<head>
<title>Tower of Hanoi Game</title>

<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}

h1{
    margin-top:20px;
}

.controls{
    margin:20px;
}

select,button{
    padding:8px 12px;
    font-size:15px;
    border:none;
    border-radius:6px;
    margin:5px;
}

button{
    background:#00c9a7;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#00a78a;
}

.stats{
    margin-top:10px;
    font-size:18px;
}

.game{
    display:flex;
    justify-content:center;
    gap:80px;
    margin-top:40px;
}

.tower{
    width:140px;
    height:260px;
    border:4px solid white;
    border-radius:10px;
    display:flex;
    flex-direction:column-reverse;
    align-items:center;
    padding-bottom:10px;
    background:rgba(255,255,255,0.1);
}

.disk{
    height:22px;
    margin:3px;
    border-radius:6px;
    cursor:grab;
    color:white;
    font-size:12px;
}

</style>
</head>

<body>

<h1>Tower of Hanoi Game</h1>

<div class="controls">

<label>Number of Disks:</label>

<select id="diskSelect">
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
</select>

<button onclick="startGame()">Start Game</button>

</div>

<div class="stats">
Steps: <span id="steps">0</span> |
Time: <span id="timer">0</span> sec
</div>

<div class="game">

<div class="tower" id="tower1"></div>
<div class="tower" id="tower2"></div>
<div class="tower" id="tower3"></div>

</div>

<script>

let draggedDisk=null
let steps=0
let timer=0
let timerInterval=null
let gameStarted=false
let totalDisks=3

function startGame(){

clearInterval(timerInterval)
timer=0
steps=0
gameStarted=false

document.getElementById("timer").innerText=0
document.getElementById("steps").innerText=0

document.querySelectorAll(".tower").forEach(t=>t.innerHTML="")

totalDisks=parseInt(document.getElementById("diskSelect").value)

let tower1=document.getElementById("tower1")

for(let i=totalDisks;i>=1;i--){

let disk=document.createElement("div")

disk.classList.add("disk")

disk.style.width=(40+i*20)+"px"
disk.style.background=`hsl(${i*40},70%,60%)`
disk.innerText=i

disk.draggable=true

disk.addEventListener("dragstart",function(){
draggedDisk=this
})

tower1.appendChild(disk)

}

}

document.querySelectorAll(".tower").forEach(tower=>{

tower.addEventListener("dragover",function(e){
e.preventDefault()
})

tower.addEventListener("drop",function(){

if(!draggedDisk) return

let topDisk=this.lastElementChild

if(!topDisk || topDisk.offsetWidth>draggedDisk.offsetWidth){

this.appendChild(draggedDisk)

steps++
document.getElementById("steps").innerText=steps

if(!gameStarted){
startTimer()
gameStarted=true
}

checkWin()

}

})

})

function startTimer(){

timerInterval=setInterval(()=>{

timer++
document.getElementById("timer").innerText=timer

},1000)

}

function checkWin(){

let tower3=document.getElementById("tower3")

if(tower3.children.length==totalDisks){

clearInterval(timerInterval)

window.location.href="result.html?steps="+steps+"&time="+timer

}

}

startGame()

</script>

</body>
</html>
